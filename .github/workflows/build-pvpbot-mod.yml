name: Build PvP Bot Mod

on:
  workflow_dispatch:
  push:
    paths:
      - 'pvpbot-mod/**'
      - '.github/workflows/build-pvpbot-mod.yml'
  pull_request:
    paths:
      - 'pvpbot-mod/**'
      - '.github/workflows/build-pvpbot-mod.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pvpbot-mod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build mod
        run: gradle build --no-daemon

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: pvpbot-mod-jar
          path: pvpbot-mod/build/libs/*.jar
          if-no-files-found: error
